# The theme package lives at the repo root; docs and examples are workspace
# members that consume it via workspace:*.
packages:
  - "."
  - "docs"

# pnpm 11 build-script approval. Sharp's install/check.js hits a system
# libvips (Homebrew) and tries to build from source — skip the script and
# rely on the prebuilt @img/sharp-* platform binary at runtime.
allowBuilds:
  esbuild: true
  sharp: false

# Name patterns, not name@version: the supply-chain verify gate matches by
# package-name glob, so versioned entries are silently ignored.
minimumReleaseAgeExclude:
  - astro
  - "@astrojs/internal-helpers"
  - "@astrojs/markdown-remark"
  - "@astrojs/markdown-satteri"
  - "@astrojs/mdx"
  - "@astrojs/svelte"
  - p5

# Pin astromotion to the GitHub repo (no npm release), at an exact release
# tag — a floating ref here freezes at whatever commit main pointed to when
# the lockfile entry was first resolved, then silently never moves.
overrides:
  astromotion: github:ANUcybernetics/astromotion#v0.16.1
